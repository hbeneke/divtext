<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivText</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <main class="terminal">
        <div class="terminal__bar">
            <span class="terminal__dot terminal__dot--red"></span>
            <span class="terminal__dot terminal__dot--yellow"></span>
            <span class="terminal__dot terminal__dot--green"></span>
            <span class="terminal__title">user@divtext: ~</span>
        </div>

        <div class="terminal__body">
            <p class="line"><span class="prompt">$</span> ./divtext --help</p>
            <p class="line"><span class="accent">DivText</span> <span class="muted">v1.0.1</span></p>
            <p class="line">Turn your text into a logo built from <span class="tag">&lt;div&gt;</span> elements.</p>
            <p class="line muted">Type a word and watch it draw itself, cell by cell.</p>
            <p class="line">&nbsp;</p>
            <p class="line"><span class="prompt">$</span> ./divtext --run</p>

            <label class="line input-line" for="textInput">
                <span class="prompt">&gt;</span>
                <input
                    type="text"
                    id="textInput"
                    class="input"
                    placeholder="type here_"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                >
            </label>

            <div class="output" id="output"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__group">
            <p>
                <a href="https://hbeneke.dev" class="footer__link" aria-label="Learn more about Habakuk Beneke" target="_blank" rel="noopener noreferrer">
                    Habakuk Beneke
                </a>
            </p>
            <p class="footer__copy">Copyright© 2024-26. All bugs reserved.</p>
            <p class="footer__reveal">Made with <span class="footer__heart">❤️</span> from Spain.</p>
        </div>
    </footer>

    <script src="dist/main.js"></script>
</body>
</html>
