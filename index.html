<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivText</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="dist/style.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-mono text-fg bg-bg">
    <main class="m-auto w-full max-w-[720px] bg-term border border-white/[0.06] rounded-[10px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-2 px-[14px] py-[11px] bg-bar border-b border-black/30">
            <span class="w-3 h-3 rounded-full inline-block bg-[#ff5f56]"></span>
            <span class="w-3 h-3 rounded-full inline-block bg-[#ffbd2e]"></span>
            <span class="w-3 h-3 rounded-full inline-block bg-[#27c93f]"></span>
            <svg class="ml-2 block text-muted" width="20" height="20" viewBox="0 0 64 64" fill="none" aria-hidden="true">
                <rect x="10" y="14" width="44" height="36" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
                <line x1="10" y1="24" x2="54" y2="24" stroke="currentColor" stroke-width="3"/>
                <path d="M17 32 L22 36 L17 40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <line x1="26" y1="40" x2="36" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <span class="text-[13px] text-muted">user@divtext: ~</span>
        </div>

        <div class="px-6 pt-[26px] pb-[30px] text-[15px] leading-[1.7]">
            <p class="whitespace-pre-wrap break-words"><span class="text-secondary select-none">$</span> divtext --help</p>
            <p class="whitespace-pre-wrap break-words"><span class="text-primary font-bold">DivText</span> <span class="text-muted">v1.0.1</span></p>
            <p class="whitespace-pre-wrap break-words">Turn your text into a logo built from <span class="text-primary">&lt;div&gt;</span> elements.</p>
            <p class="whitespace-pre-wrap break-words text-muted">Type a word and watch it draw itself, cell by cell.</p>
            <p class="whitespace-pre-wrap break-words">&nbsp;</p>
            <p class="whitespace-pre-wrap break-words"><span class="text-secondary select-none">$</span> divtext --run</p>

            <label class="flex items-center gap-2 mt-2 cursor-text whitespace-pre-wrap break-words" for="textInput">
                <span class="text-secondary select-none">&gt;</span>
                <input
                    type="text"
                    id="textInput"
                    class="flex-1 bg-transparent border-none outline-none text-fg font-[inherit] text-[inherit] caret-primary placeholder:text-muted"
                    placeholder="type here_"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                >
            </label>

            <div class="mt-[18px] min-h-[80px]" id="output"></div>
        </div>
    </main>

    <footer class="flex flex-col gap-2 pt-20 pb-4 text-center text-xs font-semibold">
        <div class="group mx-auto px-4 py-2 rounded-lg transition-colors duration-300 hover:bg-white/[0.04]">
            <p>
                <a href="https://hbeneke.dev" class="text-primary font-bold no-underline [text-underline-offset:2px] transition-colors duration-200 hover:text-primary-soft hover:underline" aria-label="Learn more about Habakuk Beneke" target="_blank" rel="noopener noreferrer">
                    Habakuk Beneke
                </a>
            </p>
            <p class="mt-2 text-fg">Copyright© 2024-26. All bugs reserved.</p>
            <p class="mt-2 text-fg opacity-100 transition-opacity duration-300 [@media(hover:hover)]:opacity-0 [@media(hover:hover)]:group-hover:opacity-100">Made with <span class="text-secondary">❤️</span> from Spain.</p>
        </div>
    </footer>

    <script src="dist/main.js"></script>
</body>
</html>
